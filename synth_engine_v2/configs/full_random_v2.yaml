# 진짜 "모든 변수 활성화" — v1 실수 수정판.
# 포함:
#   1. 폰트 다양성     (filter: all — 46 CJK face 중 랜덤)
#   2. 배경 다양성     (solid / noise / gradient)
#   3. 획 두께 변이    (stroke_weight.dilate prob)
#   4. 드롭 섀도       (shadow.drop prob)
#   5. 외부 글로우     (glow.outer prob)
#   6. 채움 종류       (solid + gradient override + stripe override)
#   7. 외곽선          (outline.simple prob)
#   8. augment 전체    (geometric + photometric + degradation + camera + deformation)
#
# 각 style layer는 prob 로 때때로만 적용 — 매 샘플이 서로 다른 조합으로 나옴.

base_source:
  kind: font
  filter: all                      # 46 face 전부에서 랜덤 face

style:
  # --- 배경 (순서: solid 기본 → noise/gradient/stripe/lines 가 확률적으로 덮어씀) ---
  - layer: background.solid
    color: [255, 255, 255]
  - layer: background.noise
    scale: [0.2, 0.8]
    prob: 0.12
  - layer: background.gradient
    start: [240, 220, 180]
    end: [180, 210, 240]
    direction: vertical
    prob: 0.12
  - layer: background.stripe              # NEW: 배경 줄무늬 (글자 훼손 X)
    thickness: [20, 40]
    angle: [0, 0]                          # 고정 가로; 원하면 [0, 90] 등
    color_a: [255, 255, 255]
    color_b: [230, 235, 240]
    prob: 0.10
  - layer: background.lines               # NEW: 노트 줄 느낌
    spacing: [22, 35]
    line_width: [1, 2]
    angle: [0, 0]
    base_color: [255, 255, 250]
    line_color: [180, 200, 230]
    prob: 0.08
  - layer: background.scene                # NEW: 실제 이미지 랜덤 crop
    folder: samples/backgrounds
    mode: random_crop
    scale_jitter: [1.0, 2.0]
    dim: [0.1, 0.4]                        # 살짝 어둡게 (글자 대비 확보)
    desaturate: [0.0, 0.5]                 # 가끔 채도 낮춤
    blur: [0.0, 1.5]                       # 가끔 배경 흐림
    prob: 0.25                             # 25% 샘플에 적용

  # --- 가끔 bold (획 두께 확장) ---
  - layer: stroke_weight.dilate
    radius: [0, 3]
    prob: 0.3

  # --- 가끔 그림자 ---
  - layer: shadow.drop
    offset: [[2, 2], [8, 8]]
    blur: [2, 6]
    color: [70, 70, 70]
    prob: 0.25

  # --- 가끔 네온 글로우 ---
  - layer: glow.outer
    color: [0, 200, 255]
    dilate: [2, 5]
    blur: [5, 12]
    prob: 0.1

  # --- 채움: contrast-aware HSV 난수 ---
  # H 전체 랜덤 + S 높게 제약 → 매번 다른 색, 채도 보장.
  # 배경 median luma 로 dark/light 방향 결정, signed min_contrast 체크 후
  # 미달 시 재시도. max_attempts 모두 실패하면 black/white fallback.
  - layer: fill.hsv_contrast
    threshold: 160
    saturation: [0.5, 1.0]          # 채도 하한 0.5 — 완전 회색 배제
    value: [0.0, 1.0]               # V 전체. 최종 luma 가 방향 결정
    sample_region: mask_dilated
    use_median: true
    min_contrast: 60                # signed luma gap (방향 정해진 대비)
    max_attempts: 8
  # 가끔 gradient 로 덮어쓰기 (컬러 variation)
  - layer: fill.gradient
    start: [220, 60, 40]
    end: [40, 60, 220]
    direction: vertical
    prob: 0.15
  # fill.stripe 제거됨 — 획 연속성 파괴로 label 훼손. stripe는 배경으로만.

  # --- 가끔 외곽선 ---
  - layer: outline.simple
    radius: [1, 3]
    color: [0, 0, 0]
    prob: 0.25

augment:
  # --- 기하 (항상 적용, min 근처면 거의 원본) ---
  - op: rotate
    angle: [-15, 15]
  - op: perspective
    strength: [0.04, 0.25]

  # --- 광도 (축소: darkening 은 low_light 에게 맡김) ---
  - op: brightness
    factor: [0.9, 1.4]              # 극단 darkening 제거 — fill 결정 흔들리는거 방지
  - op: contrast
    factor: [0.85, 1.3]

  # --- 열화 ---
  - op: gaussian_blur
    sigma: [0.0, 2.0]
    prob: 0.6
  - op: motion_blur
    kernel: [1, 5]
    angle: [0, 180]
    prob: 0.25
  - op: gaussian_noise
    std: [0, 25]
  - op: jpeg
    quality: [20, 98]

  # --- 카메라 결함 (모두 확률로 스탠스 분산) ---
  - op: defocus
    radius: [0.0, 3.0]
    prob: 0.3
  - op: chromatic_aberration
    shift: [-4, 4]
    prob: 0.4
  - op: lens_distort
    k: [-0.12, 0.12]
    prob: 0.5
  - op: low_light
    brightness: [0.35, 0.65]
    noise_std: [5, 15]
    prob: 0.2

  # --- 변형 (mild 만, 가끔) ---
  - op: elastic
    alpha: [4, 8]
    sigma: [5, 7]
    prob: 0.3
    # 필체 소스는 이미 per-stroke jitter 로 자연 떨림이 있음 → 이중 왜곡 방지
    skip_if_kinds: [svg_stroke, ehanja_median, kanjivg_median]
