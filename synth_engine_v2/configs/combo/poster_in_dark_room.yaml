# 포스터 스타일로 꾸민 글자를 어두운 방에서 흔들리며 찍은 사진 시뮬.
# style + augment를 교차 조합한 첫 번째 combo 프리셋.
base_source:
  kind: font
  filter: all

style:
  - layer: background.solid
    color: [245, 230, 210]
  - layer: shadow.drop
    offset: [[3, 3], [7, 7]]
    blur: [3, 6]
    color: [60, 30, 20]
  - layer: stroke_weight.dilate
    radius: [1, 2]
  - layer: fill.gradient
    start: [240, 110, 40]
    end: [80, 20, 90]
  - layer: outline.simple
    radius: [2, 3]
    color: [20, 10, 10]

augment:
  - op: perspective
    strength: [0.05, 0.12]
  - op: rotate
    angle: [-6, 6]
  - op: low_light
    brightness: [0.35, 0.65]
    noise_std: [5, 15]
  - op: defocus
    radius: [0.3, 1.5]
  - op: jpeg
    quality: [40, 85]
