# v3 Level A — TG-0 베이스라인 측정 (doc/22 §2 참조).
#
# 목적: PyTorch 기본 설정 (channels_last 미적용, torch.compile 미적용,
# bf16 미적용) 에서의 steady-state img/s 와 VRAM peak 을 측정.
# 이후 TG-1 / TG-2 / TG-3 의 효과 비교 baseline.
#
# Scope: 32 shards × 2 epochs ≈ 320,000 샘플. RTX 4080 Laptop 기준 5-10 분.
#   - epoch 1: warmup (cuDNN benchmark, allocator settle, JIT 미들 캐시)
#   - epoch 2: 측정 — train_loop 의 win rate 가 안정 plateau
#
# 비교 metric:
#   - cum rate (img/s) — 전체 누적, 부정확
#   - **win rate (img/s)** — 최근 50 step 평균, 이 값으로 비교
#   - vram_torch peak / vram_dev peak (sysmon)
#   - eval/char_top1, eval/radical_top1 — sanity 만 (단기라 정확도 낮음 정상)
#
# NVTX 캡처는 별도:
#   nsys profile -o tg0_baseline -t nvtx,cuda \
#     <python> train_engine_v3/scripts/00_smoke.py --config <this>

run_name: level_a_tg0_baseline

data:
  format: tensor_shard
  # relative paths — see smoke yaml comment.
  shard_dir: synth_engine_v3/out/94_production_102k_x200
  aux_labels: synth_engine_v3/out/94_production_102k_x200/aux_labels.npz
  max_shards: 32                 # 32 × 5000 = 160k samples × 2 epoch = 320k
  val_ratio: 0.0625              # 32 → 30 train + 2 val (val 은 epoch 끝에 짧게)

model:
  name: resnet18
  input_size: 128

train:
  batch_size: 256
  num_workers: 4
  epochs: 2                      # 1 = warmup, 2 = 측정
  lr: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  label_smoothing: 0.1
  amp: true                      # fp16 default. TG-1 에서 bf16 시도

loss_weights:
  char: 1.0
  radical: 0.2
  total: 0.1
  residual: 0.1
  idc: 0.2

eval:
  every_epoch: 1

out_dir: train_engine_v3/out/01_tg0_baseline
