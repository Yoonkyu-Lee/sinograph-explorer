# T3-mini-ckpt-test — 빠르게 ckpt + scheduler + resume 동작 검증.
#   1 epoch 만, 100 shards.

run_name: level_a_t3_mini_ckpt_test
data:
  format: tensor_shard
  shard_dir: synth_engine_v3/out/94_production_102k_x200
  aux_labels: synth_engine_v3/out/94_production_102k_x200/aux_labels.npz
  max_shards: 100
  val_per_shard: 100

model:
  name: resnet18
  input_size: 128

train:
  batch_size: 640
  num_workers: 4
  epochs: 1
  lr: 0.4                        # bs=640 linear scale (v2 base 0.1@bs=128 → 0.5, conservative)
  momentum: 0.9
  weight_decay: 5.0e-4
  label_smoothing: 0.1
  amp: true
  amp_dtype: fp16
  cudnn_benchmark: true
  channels_last: false
  compile: off
  scheduler: cosine
  warmup_epochs: 0.5             # 50% of 1 epoch warmup (test only)
  ckpt_save: true
  ckpt_best_by: char/top1
  resume: true

loss_weights: { char: 1.0, radical: 0.2, total: 0.1, residual: 0.1, idc: 0.2 }
eval: { every_epoch: 1 }
out_dir: train_engine_v3/out/13_t3_ckpt_test
