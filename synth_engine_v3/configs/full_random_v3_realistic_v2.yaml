# v3 realistic v2 — Codex Tier 1 feedback 반영 (2026-04-23).
#
# v1 (full_random_v3_realistic.yaml) 대비 달라진 점:
#   1. background.one_of  — 독립 overwrite 체인 → 카테고리컬 1개 선택
#   2. augment.clean_prob 0.25 — 샘플의 1/4 은 augment 전부 bypass (pristine anchor)
#   3. elastic 제거 — printed/engraved sign 도메인에 비현실적
#   4. gaussian_noise / perspective / brightness / contrast 에 명시적 prob — 더 이상 always-on 아님
#   5. jpeg / defocus / chromatic_aberration / lens_distort / low_light prob 완화
#
# 의미: "augment 많이 섞는다" 에서 "장면을 먼저 뽑고 각 장면 안에서 적절히 변주" 로 이동.
# 기존 v1 은 보존 (비교용 baseline).
#
# Training decode 해상도: 192 (shard 는 256 저장 유지, loader 에서 resize).

# Glyph shrink factor: v2 render → 288 in 384 canvas → overflows 256 crop.
# 0.7 → glyph occupies ~202 px in 384 canvas = ~80 % of 256 crop (≈ 27 px
# margin per side). Leaves room for perspective / lens_distort without
# clipping strokes. Per-sample (Codex follow-up).
glyph_scale: 0.7

base_source:
  kind: font

style:
  # 배경 — mutually exclusive 1개 선택 (Codex 지적: overwrite 구조 교정).
  # weight 합계 12. plain white 가 지배적 (50%) — 대부분 샘플이 깨끗한 배경.
  - layer: background.one_of
    choices:
      - layer: background.solid
        color: [255, 255, 255]
        weight: 6                      # plain white 50%

      - layer: background.solid
        color:
          - [220, 30, 30]              # 네온 빨강 (중식당)
          - [230, 180, 30]             # 황색 (공사장/경고)
          - [40, 80, 220]              # 도로표지 파랑
          - [50, 150, 80]              # 간판 초록
          - [140, 90, 60]              # 구리/나무
        weight: 2                      # saturated 17%

      - layer: background.solid
        color:
          - [20, 20, 20]               # 진 검정
          - [30, 25, 40]               # 진 남보라
        weight: 1                      # dark board 8%

      - layer: background.gradient
        start: [240, 220, 180]
        end: [180, 210, 240]
        direction: vertical
        weight: 1                      # gradient 8%

      - layer: background.noise
        scale: [0.2, 0.8]
        weight: 2                      # procedural noise bg 17%

  - layer: stroke_weight.dilate
    amount: [0, 2]
    prob: 0.3

  - layer: shadow.drop
    offset: [2, 8]
    blur: [2, 6]
    color: [70, 70, 70]
    prob: 0.20

  - layer: glow.outer
    color: [0, 200, 255]
    radius: [2, 5]
    blur: [5, 10]
    strength: [0.4, 0.8]
    prob: 0.06

  # 네온 효과 — 네온 간판 전형
  - layer: glow.neon
    color:
      - [255, 40, 40]
      - [40, 255, 40]
      - [40, 140, 255]
      - [255, 220, 40]
    outer_dilate: [2, 5]
    outer_blur: [6, 12]
    inner_blur: [2, 5]
    core_color: [255, 255, 255]
    prob: 0.06

  # 채움: HSV 대비 채움 (contrast 보장).
  - layer: fill.hsv_contrast
    threshold: 160
    saturation: [0.5, 1.0]
    value: [0.0, 1.0]
    min_contrast: 60
    max_attempts: 8

  - layer: outline.simple
    width: [1, 2]
    color: [0, 0, 0]
    prob: 0.20

  - layer: outline.double
    outer_offset: [3, 6]
    outer_width: [1, 3]
    inner_width: [1, 2]
    outer_color:
      - [255, 255, 255]
      - [240, 240, 200]
    inner_color:
      - [0, 0, 0]
      - [60, 20, 20]
    prob: 0.12

# augment 블록 — clean_prob 있는 dict 형식 (Codex Tier 1).
augment:
  clean_prob: 0.25
  ops:
    # geometric — 전부 prob-gated (이전엔 rotate/perspective always-on)
    - op: rotate
      angle: [-10, 10]
      prob: 0.7
    - op: perspective
      strength: [0.04, 0.2]
      prob: 0.5

    # photometric — unfused per-op chain.
    # NOTE: OPT-3 fusion attempt (photometric_fused CUDA kernel) was tested
    # and found to be a NET LOSS (-13 %). The unfused version benefits from
    # per-op probabilistic sub-batch slicing (each op runs on ~30-60 % of
    # samples), which beats the fused kernel that has to process every
    # sample for all four ops. See doc/20 §13.
    - op: brightness
      factor: [0.9, 1.4]
      prob: 0.6
    - op: contrast
      factor: [0.85, 1.3]
      prob: 0.6
    - op: invert
      prob: 0.25

    # blur / noise — 2차 축소 (2026-04-23, 128 training 고려).
    # 128 decode 기준 effective blur: σ 0.8 at 384 → σ 0.27 at 128, kernel 3
    # at 384 → 1 at 128. 획 1-2 px wide 인 고획수 글자에서도 merge 최소화.
    - op: gaussian_blur
      sigma: [0.0, 0.8]
      prob: 0.3
    - op: gaussian_noise
      std: [0, 25]
      prob: 0.3
    - op: motion_blur
      kernel: [1, 3]
      angle: [0, 180]
      prob: 0.08

    # codec / camera
    - op: jpeg
      quality: [20, 98]
      prob: 0.5                 # v1: 0.6 → 0.5
    - op: defocus
      radius: [0.0, 1.2]
      prob: 0.12
    - op: chromatic_aberration
      shift: [-4, 4]
      prob: 0.3                 # v1: 0.4 → 0.3
    - op: lens_distort
      k: [-0.10, 0.10]
      prob: 0.3                 # v1: 0.5 → 0.3
    - op: low_light
      brightness: [0.35, 0.65]
      noise_std: [5, 15]
      prob: 0.15

    # scan 도메인
    - op: paper_texture
      strength: [0.05, 0.20]
      prob: 0.10
    - op: binarize
      threshold: [110, 160]
      prob: 0.05

    # elastic 제거 — printed/engraved sign 에 비현실적 (Codex)

    # 최종 안전망 — fill.hsv_contrast 는 fill-time 만 보장하고 이후 augment
    # (low_light × brightness × defocus 연쇄) 가 글자 visibility 를 삭제할 수
    # 있음. 최종 캔버스에서 inside-mask luma vs outside-mask luma 의 gap 이
    # min_gap 미만이면 강제 rescue (검정 또는 흰색 fill 덮어쓰기). 임계치 밑
    # 샘플만 터치 — 정상 샘플은 통과.
    - op: visibility_guard
      min_gap: 0.12
