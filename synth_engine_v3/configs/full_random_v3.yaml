# v3 production config — porting `full_random_multi.yaml` to the GPU engine.
#
# Omitted (not yet ported — will raise "unknown layer" error if re-enabled):
#   background.stripe / background.lines / background.scene
#   fill.gradient / fill.contrast / fill.stripe / fill.radial
#   shadow.long / shadow.soft
#   glow.inner / glow.neon
#   outline.double
#   augment.motion_blur / augment.salt_pepper_noise
#   augment.paper_texture / augment.ink_bleed / augment.binarize
# SVG-based base_source kinds (svg_stroke / ehanja_median / kanjivg_median) are
# also deferred — this config is font-only for the Phase 5 milestone.

base_source:
  kind: font

style:
  - layer: background.solid
    color: [255, 255, 255]
  - layer: background.noise
    scale: [0.2, 0.8]
    prob: 0.12
  - layer: background.gradient
    start: [240, 220, 180]
    end: [180, 210, 240]
    direction: vertical
    prob: 0.12

  - layer: stroke_weight.dilate
    amount: [0, 2]
    prob: 0.3

  - layer: shadow.drop
    offset: [2, 8]
    blur: [2, 6]
    color: [70, 70, 70]
    prob: 0.25

  - layer: glow.outer
    color: [0, 200, 255]
    radius: [2, 5]
    blur: [5, 10]
    strength: [0.4, 0.8]
    prob: 0.10

  - layer: fill.hsv_contrast
    threshold: 160
    saturation: [0.5, 1.0]
    value: [0.0, 1.0]
    min_contrast: 60
    max_attempts: 8

  - layer: outline.simple
    width: [1, 2]
    color: [0, 0, 0]
    prob: 0.25

augment:
  - op: rotate
    angle: [-10, 10]
  - op: perspective
    strength: [0.04, 0.2]

  - op: brightness
    factor: [0.9, 1.4]
  - op: contrast
    factor: [0.85, 1.3]

  - op: gaussian_blur
    sigma: [0.0, 2.0]
    prob: 0.6
  - op: gaussian_noise
    std: [0, 25]
  - op: jpeg
    quality: [20, 98]

  - op: defocus
    radius: [0.0, 3.0]
    prob: 0.3
  - op: chromatic_aberration
    shift: [-4, 4]
    prob: 0.4
  - op: lens_distort
    k: [-0.10, 0.10]
    prob: 0.5
  - op: low_light
    brightness: [0.35, 0.65]
    noise_std: [5, 15]
    prob: 0.2

  - op: elastic
    alpha: [4, 8]
    sigma: [5, 7]
    prob: 0.3
    skip_if_kinds: [svg_stroke, ehanja_median, kanjivg_median]
