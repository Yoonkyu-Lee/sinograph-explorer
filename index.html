<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sinograph Dictionary</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1 id="home-link" title="홈으로">Sinograph Dictionary</h1>
        <span class="app-sub">canonical_v3 — 한자 단자 사전</span>
      </header>

      <div class="searchbar">
        <input
          id="query"
          type="text"
          placeholder="한자 한 글자, 또는 뜻·발음 (예: 鑑 · 거울 · mirror · U+9451)"
          autocomplete="off"
        />
        <button id="go">검색</button>
        <button id="recognize" class="recognize-btn" title="화면의 한자를 인식 (Ctrl+Shift+H)">
          화면 한자 인식
        </button>
      </div>

      <nav id="crumb" class="crumb hidden"></nav>
      <div id="status" class="status"></div>

      <section id="home" class="home"></section>
      <section id="results" class="results hidden"></section>
      <section id="entry" class="entry hidden"></section>
    </div>
  </body>
</html>
